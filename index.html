<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precision Cuts Barber</title>

<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css"/>

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Arial, sans-serif; background:#111; color:white; scroll-behavior:smooth; }

nav {
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.9);
padding:15px 0;
text-align:center;
z-index:100;
}
nav a { margin:0 15px; text-decoration:none; color:white; font-weight:bold; }
nav a:hover { color:gold; }

.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1585747860715-2ba37e788b70") center/cover no-repeat;
}
.hero h1 { font-size:4em; margin-bottom:10px; }
.hero p { font-size:1.5em; margin-bottom:20px; }
.hero .button {
background:gold;
color:black;
padding:15px 30px;
border-radius:5px;
text-decoration:none;
font-weight:bold;
}

section { padding:80px 20px; }

section#gallery h2 { text-align:center; font-size:2.5em; margin-bottom:20px; }

.swiper { width:90%; max-width:1000px; height:400px; margin:0 auto 50px auto; }
.swiper-slide img { width:100%; height:100%; object-fit:cover; border-radius:10px; }

#map { width:100%; height:400px; margin-top:15px; border-radius:10px; }

.contact-info { text-align:center; }
.contact-info a { color:gold; text-decoration:underline; }

form { margin-top:20px; text-align:center; }
form input { padding:10px; border-radius:5px; border:none; }
form button { padding:10px 20px; background:gold; border:none; font-weight:bold; }

@media(max-width:768px){
.hero h1 { font-size:2.5em; }
.hero p { font-size:1em; }
.swiper { height:300px; }
}
</style>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

</head>
<body>

<nav>
<a href="#home">Home</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
<a href="about.html">About Me</a>
</nav>

<section class="hero" id="home">
<h1>Precision Cuts</h1>
<p>Clean Fades. Sharp Lines. Premium Service.</p>
<a class="button" href="https://calendly.com/sajeddazine" target="_blank">Book Appointment</a>
</section>

<section id="gallery">
<h2>Gallery</h2>
<div class="swiper">
<div class="swiper-wrapper">
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a"></div>
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1621607512022-6aecc4fed814"></div>
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438"></div>
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e"></div>
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1596912101241-67f2e2d0fce2"></div>
</div>
<div class="swiper-button-next"></div>
<div class="swiper-button-prev"></div>
<div class="swiper-pagination"></div>
</div>
</section>

<section id="contact">
<h2 style="text-align:center;">Contact</h2>
<div class="contact-info">

<p>Email: your@email.com</p>
<p>Phone: (123) 456-7890</p>

<p>
<a href="https://maps.google.com/?q=37.90176,-122.061923" target="_blank">
Figurati Barber Studio  
1528 N Main St UNIT 104, Walnut Creek, CA
</a>
</p>

<div id="map"></div>

<p style="margin-top:20px;">Subscribe for news, promos, and deals:</p>

<form>
<input type="email" placeholder="Enter your email" required>
<button type="submit">Subscribe</button>
</form>

</div>
</section>

<script>
var swiper = new Swiper('.swiper', {
loop:true,
autoplay:{delay:3000},
pagination:{el:'.swiper-pagination', clickable:true},
navigation:{nextEl:'.swiper-button-next', prevEl:'.swiper-button-prev'}
});

function initMap() {
const location = { lat: 37.90176, lng: -122.061923 };

const map = new google.maps.Map(document.getElementById("map"), {
zoom: 18,
center: location,
mapTypeId: "roadmap"
});

const marker = new google.maps.Marker({
position: location,
map: map,
title: "Figurati Barber Studio"
});
}
</script>

<!-- REPLACE WITH YOUR API KEY -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initMap">
</script>

</body>
</html>
