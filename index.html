<!-- Google Map with Exact Pin for Figurati Barber Studio -->
<div id="map" style="width:100%;height:400px;margin-top:10px;"></div>

<script>
function initMap() {

  const figurati = {
    lat: 37.90544,
    lng: -122.05997
  };

  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 17,
    center: figurati,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true
  });

  const marker = new google.maps.Marker({
    position: figurati,
    map: map,
    title: "Figurati Barber Studio"
  });

  const infoWindow = new google.maps.InfoWindow({
    content: `
      <strong>Figurati Barber Studio</strong><br>
      1528 N Main St UNIT 104<br>
      Walnut Creek, CA 94596
    `
  });

  marker.addListener("click", () => {
    infoWindow.open(map, marker);
  });

}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6amfkc6AaS9xUrrIgKqP1-w3Rw13pdyA&callback=initMap">
</script>
