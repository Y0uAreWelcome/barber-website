<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squareslash | Website Design</title>

<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css"/>

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Arial, sans-serif; background:#111; color:white; scroll-behavior:smooth; }

nav {
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.9);
padding:15px 0;
text-align:center;
z-index:100;
}
nav a { margin:0 15px; text-decoration:none; color:white; font-weight:bold; }
nav a:hover { color:gold; }

.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1498050108023-c5249f4df085") center/cover no-repeat;
}
.hero h1 { font-size:4em; margin-bottom:10px; }
.hero p { font-size:1.5em; margin-bottom:20px; }
.hero .button {
background:gold;
color:black;
padding:15px 30px;
border-radius:5px;
text-decoration:none;
font-weight:bold;
}

section { padding:80px 20px; }

section#gallery h2 { text-align:center; font-size:2.5em; margin-bottom:20px; }

.swiper { width:90%; max-width:1000px; height:400px; margin:0 auto 50px auto; }
.swiper-slide img { width:100%; height:100%; object-fit:cover; border-radius:10px; }

.contact-info { text-align:center; }
.contact-info p { margin:10px 0; }

form { margin-top:20px; text-align:center; }
form input { padding:10px; border-radius:5px; border:none; }
form button { padding:10px 20px; background:gold; border:none; font-weight:bold; cursor:pointer; }

@media(max-width:768px){
.hero h1 { font-size:2.5em; }
.hero p { font-size:1em; }
.swiper { height:300px; }
}
</style>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="portfolio.html">Portfolio</a>
<a href="#contact">Contact</a>
</nav>

<section class="hero" id="home">
<h1>Squareslash</h1>
<p>We Build Websites That Grow Your Business</p>
<a class="button" href="https://calendly.com/sajeddazine" target="_blank">Book Consultation</a>
</section>

<section id="gallery">
<h2>Our Work</h2>
<div class="swiper">
<div class="swiper-wrapper">
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1558655146-9f40138edfeb"></div>
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0"></div>
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1522542550221-31fd19575a2d"></div>
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a"></div>
<div class="swiper-slide"><img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c"></div>
</div>
<div class="swiper-button-next"></div>
<div class="swiper-button-prev"></div>
<div class="swiper-pagination"></div>
</div>
</section>

<section id="contact">
<h2 style="text-align:center;">Contact</h2>
<div class="contact-info">
<p>Email: hello@squareslash.com</p>
<p>Phone: (000) 000-0000</p>

<p style="margin-top:20px;">Subscribe for news, promos, and deals:</p>

<form>
<input type="email" placeholder="Enter your email" required>
<button type="submit">Subscribe</button>
</form>
</div>
</section>

<script>
var swiper = new Swiper('.swiper', {
loop:true,
autoplay:{delay:3000},
pagination:{el:'.swiper-pagination', clickable:true},
navigation:{nextEl:'.swiper-button-next', prevEl:'.swiper-button-prev'}
});
</script>

</body>
</html>
