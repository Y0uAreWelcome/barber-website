<!DOCTYPE html>

<title>Squareslash | Portfolio</title>

<style>
body { font-family: Arial, sans-serif; background:#111; color:white; margin:0; }

nav {
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.9);
padding:15px 0;
text-align:center;
}
nav a {
margin:0 15px;
text-decoration:none;
color:white;
font-weight:bold;
}
nav a:hover { color:gold; }

section {
padding:100px 20px;
text-align:center;
}

.portfolio-grid {
display:grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.card {
background:#222;
padding:20px;
border-radius:10px;
}

.card img {
width:100%;
border-radius:8px;

}

/* GOLD BUTTON STYLE */
.gold-button {
background:gold;
color:black;
padding:12px 25px;
border-radius:5px;
font-weight:bold;
text-decoration:none;
display:inline-block;
margin-top:30px;
transition: transform 0.3s, background 0.3s;
}

.gold-button:hover {
background:white;
transform:scale(1.05);
}
</style>

</head>

<nav>
