<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<script src="https://js.stripe.com/v3/"></script>

<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

.item {
  background:#222;
  margin:10px auto;
  padding:15px;
  border-radius:10px;
  max-width:400px;
}

.total {
  font-size:24px;
  margin-top:20px;
}

.pay-btn {
  margin-top:20px;
  padding:15px 30px;
  background:gold;
  color:black;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Checkout</h1>

<div id="summary"></div>
<div class="total" id="total"></div>

<button class="pay-btn" onclick="pay()">Pay Securely</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let summary = document.getElementById("summary");
let total = 0;

cart.forEach(item => {
  summary.innerHTML += `
    <div class="item">
      ${item.name} - $${item.price}
    </div>
  `;
  total += item.price;
});

document.getElementById("total").innerText = "Total: $" + total;

function pay(){

// Example logic — redirect based on total

if(total == 499){
  window.location.href = "https://buy.stripe.com/28E4gAeaPdKu2Y7fPrawo02";
}
else if(total == 599){
  window.location.href = "https://buy.stripe.com/5kQ6oIeaPayi9mvgTvawo00";
}
else if(total == 399){
  window.location.href = "https://buy.stripe.com/fZu8wQaYDfSCeGPfPrawo01";
}
else{
  alert("Contact us for custom bundle checkout");
}

}
</script>

</body>
</html>
