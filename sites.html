<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squareslash | Sites For Sale</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  margin:0;
}

/* NAVBAR */
nav {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.9);
  padding:15px 0;
  text-align:center;
  z-index:100;
}

nav a {
  margin:0 15px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

nav a:hover {
  color:gold;
}

/* CART ICON */
.cart-icon {
  position:absolute;
  right:20px;
  top:10px;
  background:gold;
  color:black;
  padding:8px 14px;
  border-radius:20px;
  font-weight:bold;
  text-decoration:none;
}

/* PAGE */
section {
  padding:100px 20px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

/* CARD */
.card {
  background:#222;
  padding:20px;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:8px;
  margin-bottom:15px;
}

/* BUY BUTTON */
.buy-btn {
  margin-top:10px;
  padding:12px 25px;
  background:gold;
  color:black;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

.buy-btn:hover {
  background:white;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="portfolio.html">Portfolio</a>
<a href="sites.html">Sites For Sale</a>
<a href="index.html#contact">Contact</a>

<a href="cart.html" class="cart-icon">
🛒 <span id="cart-count">0</span>
</a>
</nav>

<section>
<h1>Sites For Sale</h1>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1581291518633-83b4ebd1d83e">
<h3>Barber Website</h3>
<p>$499</p>
<button class="buy-btn" onclick="addToCart('Barber Website', 499)">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a">
<h3>Restaurant Website</h3>
<p>$599</p>
<button class="buy-btn" onclick="addToCart('Restaurant Website', 599)">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1553877522-43269d4ea984">
<h3>Creator Website</h3>
<p>$399</p>
<button class="buy-btn" onclick="addToCart('Creator Website', 399)">Buy</button>
</div>

</div>

</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartCount(){
  document.getElementById("cart-count").innerText = cart.length;
}

function addToCart(name, price){
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert(name + " added to cart!");
}

updateCartCount();
</script>

</body>
</html>
